server:
  port: 8080

spring:
    profiles:
      active: local
    datasource:
      url: jdbc:mysql://localhost:3307/test
      username: root
      password: 12345678
      driver-class-name: com.mysql.cj.jdbc.Driver

    jpa:
      hibernate:
        ddl-auto: update
      show-sql: true
      properties:
        hibernate:
          format_sql: true
          dialect: org.hibernate.dialect.MySQLDialect
    cloud:
      aws:
        region:
          static: ap-northeast-2
        stack:
          auto: false

management:
  endpoint:
    health:
      show-details: never
  info:
    env:
      enabled: true
  endpoints:
    web:
      exposure:
        include: health,info

info:
  app:
    message: ${APP_MESSAGE}

jwt:
  secret:
    key: 7Iqk7YyA66as67KV64uY64uk7J207Yq466as7J2064pU64u567m866as6rWQ7J206re466as64uk

logging:
  level:
    root: INFO
    org.example.expert: DEBUG